# Supabase project configuration.
# Project ref: hglmgarxgfgtxlmexkfp

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323

[inbucket]
enabled = true
port = 54324

[storage]
enabled = true
file_size_limit = "50MiB"

[auth]
enabled = true
site_url = "http://localhost:3000"
jwt_expiry = 3600
enable_signup = true

[edge_runtime]
enabled = true
policy = "oneshot"
inspector_port = 8083

# taskweft-edge: Elixir planning logic compiled to AtomVM WebAssembly via Popcorn.
#
# Build artifacts (run with OTP 26.0.2 + Elixir 1.17.3 via `mise install`):
#   mix popcorn.build_runtime --target wasm   # one-time, builds AtomVM.wasm
#   mix popcorn.cook --include-vm             # bundle.avm + VM artifacts
#
# Runtime blocker: popcorn.js uses <iframe> + postMessage (browser-only).
# Deno has no DOM. Porting the bridge to a Deno Worker is the next step
# before `supabase functions deploy taskweft-edge` can serve real traffic.
[functions.taskweft-edge]
static_files = [
  "./functions/taskweft-edge/bundle.avm",
  "./functions/taskweft-edge/AtomVM.wasm",
  "./functions/taskweft-edge/AtomVM.mjs",
  "./functions/taskweft-edge/popcorn.js",
  "./functions/taskweft-edge/popcorn_iframe.js",
]
